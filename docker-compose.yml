version: '3.8'

services:
  # 1. PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: eyewear_postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres_secure_pw}
      POSTGRES_DB: ${POSTGRES_DB:-eyewear_oms}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # 2. Redis Message Broker
  redis:
    image: redis:alpine
    container_name: eyewear_redis
    restart: always
    ports:
      - "6379:6379"

  # 3. FastAPI Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: eyewear_backend
    restart: always
    environment:
      - DATABASE_URL=postgresql+psycopg2://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres_secure_pw}@postgres:5432/${POSTGRES_DB:-eyewear_oms}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - JWT_SECRET=${JWT_SECRET:-super_secret_jwt_signing_key_change_me_in_production_1234567890}
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis

  # 4. Celery Asynchronous Workers
  celery:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: eyewear_celery
    restart: always
    command: celery -A celery_app.celery_app worker --loglevel=info
    environment:
      - DATABASE_URL=postgresql+psycopg2://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres_secure_pw}@postgres:5432/${POSTGRES_DB:-eyewear_oms}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - JWT_SECRET=${JWT_SECRET:-super_secret_jwt_signing_key_change_me_in_production_1234567890}
    depends_on:
      - redis
      - postgres

  # 5. React Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: eyewear_frontend
    restart: always
    depends_on:
      - backend

  # 6. Nginx Reverse Proxy Gateway Ingress
  nginx:
    image: nginx:stable-alpine
    container_name: eyewear_gateway
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend

volumes:
  postgres_data:
